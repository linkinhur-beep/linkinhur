name: NHN Cloud 보안 파이프라인

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NCR_REGISTRY: kr1.registry.container.nhncloud.com
  NCR_REGISTRY_NAME: test_ncr
  IMAGE_NAME: linkinhur-app
  IMAGE_TAG: ${{ github.run_number }}

jobs:

  sast:
    name: 01. SAST 정적 분석
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Semgrep SAST 분석
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
        continue-on-error: true

  build-and-scan:
    name: 02. 이미지 빌드 + CVE 스캔
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드
        run: |
          docker build \
            -t ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest \
            .
          echo "이미지 빌드 완료"

      - name: Trivy CVE 취약점 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: NCR 로그인
        run: |
          echo "${{ secrets.NHN_PASSWORD }}" | docker login \
            ${{ env.NCR_REGISTRY }} \
            --username "${{ secrets.NHN_USERNAME }}" \
            --password-stdin

      - name: NCR Push
        run: |
          docker push ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
          echo "NCR Push 완료"

  dast:
    name: 03. DAST 동적 점검
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: OWASP ZAP 스캔
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ secrets.APP_URL }}
          cmd_options: '-a'
          allow_issue_writing: false
        continue-on-error: true

  runtime-check:
    name: 04. 런타임 보안 검증
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Dockerfile 보안 검사
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
        continue-on-error: true

  fim-baseline:
    name: 05. FIM 기준선 등록
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 파일 해시 기준선 생성
        run: |
          find . -type f \( -name "*.html" -o -name "Dockerfile" \) \
            -not -path "./.git/*" \
            -exec sha256sum {} \; > fim-baseline.txt
          cat fim-baseline.txt
          echo "FIM 기준선 등록 완료"

      - name: FIM 기준선 저장
        uses: actions/upload-artifact@v4
        with:
          name: fim-baseline-${{ env.IMAGE_TAG }}
          path: fim-baseline.txt
          retention-days: 90

  security-report:
    name: 06. 보안 점검 결과 요약
    runs-on: ubuntu-latest
    needs: [sast, build-and-scan, dast, runtime-check, fim-baseline]
    if: always()

    steps:
      - name: 결과 요약 출력
        run: |
          echo "==============================="
          echo " 보안 파이프라인 실행 결과"
          echo "==============================="
          echo "빌드 번호 : ${{ env.IMAGE_TAG }}"
          echo "이미지    : ${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo ""
          echo "01 SAST           : ${{ needs.sast.result }}"
          echo "02 빌드+CVE 스캔  : ${{ needs.build-and-scan.result }}"
          echo "03 DAST           : ${{ needs.dast.result }}"
          echo "04 런타임 검증    : ${{ needs.runtime-check.result }}"
          echo "05 FIM 기준선     : ${{ needs.fim-baseline.result }}"
          echo "==============================="
