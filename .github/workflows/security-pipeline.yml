# ================================================
# NHN Cloud 보안 통합 CI/CD - GitHub Actions 워크플로
# SAST + 이미지 빌드 + CVE 스캔 + DAST + NCR Push
# ================================================

name: NHN Cloud 보안 파이프라인

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NCR_REGISTRY: kr1.registry.container.nhncloud.com
  NCR_REGISTRY_NAME: ${{ secrets.NCR_REGISTRY_NAME }}
  IMAGE_NAME: linkinhur-app
  IMAGE_TAG: ${{ github.run_number }}

jobs:

  # ================================================
  # [JOB 1] SAST — 정적 코드 분석 (2.1 취약점 평가)
  # ================================================
  sast:
    name: 01. SAST 정적 분석
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Semgrep SAST 분석
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/docker
            p/secrets
        continue-on-error: true  # 테스트용: 실패해도 다음 단계 진행

      - name: OWASP Dependency-Check (SCA)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'linkinhur-app'
          path: '.'
          format: 'HTML'
          out: 'reports/dependency-check'
          args: >
            --enableRetired
        continue-on-error: true

      - name: 분석 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: reports/
        if: always()

  # ================================================
  # [JOB 2] 이미지 빌드 + CVE 스캔 (2.1 취약점 평가)
  # ================================================
  build-and-scan:
    name: 02. 이미지 빌드 + CVE 스캔
    runs-on: ubuntu-latest
    needs: sast
    outputs:
      image-tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드
        run: |
          docker build \
            -t ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest \
            .
          echo "✅ 이미지 빌드 완료"

      - name: Trivy CVE 취약점 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '0'          # 테스트용: 0=발견해도 통과, 1=발견 시 실패
          severity: 'CRITICAL,HIGH'
          output: 'reports/trivy-result.txt'

      - name: Trivy 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy-result.txt
        if: always()

      - name: Critical CVE 발견 시 파이프라인 중단
        run: |
          CRITICAL=$(grep -c "CRITICAL" reports/trivy-result.txt || true)
          echo "발견된 Critical CVE: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical CVE 발견! 배포 차단."
            # exit 1  # 실제 운영 시 주석 해제
          else
            echo "✅ CVE 스캔 통과"
          fi

      - name: NCR 로그인
        run: |
          echo "${{ secrets.NHN_PASSWORD }}" | docker login \
            ${{ env.NCR_REGISTRY }} \
            --username "${{ secrets.NHN_USERNAME }}" \
            --password-stdin

      - name: NCR Push
        run: |
          docker push ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.NCR_REGISTRY }}/${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
          echo "✅ NCR Push 완료"

  # ================================================
  # [JOB 3] DAST — 동적 취약점 점검 (2.1 취약점 평가)
  # ================================================
  dast:
    name: 03. DAST 동적 점검 (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'  # main 브랜치 Push 시에만 실행

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: OWASP ZAP 전체 스캔
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ secrets.APP_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          allow_issue_writing: false
        continue-on-error: true  # 테스트용

      - name: ZAP 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
        if: always()

  # ================================================
  # [JOB 4] 런타임 보호 검증 (2.2 런타임)
  # ================================================
  runtime-check:
    name: 04. 런타임 보안 설정 검증
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Dockerfile 보안 검사 (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
        continue-on-error: true

      - name: 컨테이너 보안 컨텍스트 검증
        run: |
          echo "=== 보안 설정 검증 ==="
          # non-root 유저 확인
          grep -q "USER" Dockerfile && echo "✅ non-root 유저 설정 확인" || echo "⚠️ USER 지시어 없음"
          # HEALTHCHECK 확인
          grep -q "HEALTHCHECK" Dockerfile && echo "✅ HEALTHCHECK 설정 확인" || echo "⚠️ HEALTHCHECK 없음"
          # latest 태그 사용 여부 확인
          grep "FROM.*:latest" Dockerfile && echo "⚠️ latest 태그 사용 - 고정 버전 권장" || echo "✅ 고정 버전 태그 사용"
          echo "=== 검증 완료 ==="

  # ================================================
  # [JOB 5] FIM 기준선 스냅샷 (2.3 FIM)
  # ================================================
  fim-baseline:
    name: 05. FIM 기준선 등록
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 파일 해시 기준선 생성
        run: |
          echo "=== FIM 기준선 스냅샷 생성 ==="
          # 중요 파일 해시값 기록 (무결성 검증용)
          find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.html" -o -name "Dockerfile" \) \
            -not -path "./.git/*" \
            -exec sha256sum {} \; > fim-baseline.txt
          echo "생성된 기준선 파일:"
          cat fim-baseline.txt
          echo "✅ FIM 기준선 등록 완료"

      - name: FIM 기준선 아티팩트 저장
        uses: actions/upload-artifact@v4
        with:
          name: fim-baseline-${{ env.IMAGE_TAG }}
          path: fim-baseline.txt
          retention-days: 90

  # ================================================
  # [JOB 6] 최종 보안 리포트 (전체 요약)
  # ================================================
  security-report:
    name: 06. 보안 점검 최종 리포트
    runs-on: ubuntu-latest
    needs: [sast, build-and-scan, dast, runtime-check, fim-baseline]
    if: always()

    steps:
      - name: 보안 점검 결과 요약
        run: |
          echo "================================================"
          echo "  NHN Cloud 보안 파이프라인 실행 결과 요약"
          echo "================================================"
          echo "빌드 번호  : ${{ env.IMAGE_TAG }}"
          echo "이미지     : ${{ env.NCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "실행 시각  : $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "[2.1 취약점 평가]"
          echo "  SAST (Semgrep)          : ${{ needs.sast.result }}"
          echo "  CVE 스캔 (Trivy)        : ${{ needs.build-and-scan.result }}"
          echo "  DAST (OWASP ZAP)        : ${{ needs.dast.result }}"
          echo ""
          echo "[2.2 런타임 보호]"
          echo "  Dockerfile 보안 검사    : ${{ needs.runtime-check.result }}"
          echo ""
          echo "[2.3 FIM]"
          echo "  FIM 기준선 등록         : ${{ needs.fim-baseline.result }}"
          echo ""
          echo "전체 보안 리포트: GitHub Actions > Artifacts 에서 확인"
          echo "================================================"

      - name: 모든 보안 리포트 다운로드
        uses: actions/download-artifact@v4
        with:
          path: all-reports/
        continue-on-error: true

      - name: 통합 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ env.IMAGE_TAG }}
          path: all-reports/
          retention-days: 30
